<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Focus Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #818cf8;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .mantra-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        h1, h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin: 0 0 16px 0;
        }

        .mantra-text {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
            outline: none;
            padding: 4px;
        }

        .focus-list {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            text-align: left;
            margin-bottom: 20px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .todo-item:last-child {
            margin-bottom: 0;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            margin-right: 14px;
            cursor: pointer;
            position: relative;
            background: transparent;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: #0f172a;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .todo-text {
            font-size: 1.05rem;
            outline: none;
            width: 100%;
            padding: 2px 4px;
            border-radius: 4px;
        }

        input[type="checkbox"]:checked + .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Input styling when editing text */
        [contenteditable="true"] {
            border-bottom: 1px dashed var(--accent);
            background: rgba(255, 255, 255, 0.02);
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            color: var(--text-main);
            border-color: var(--accent);
            background: rgba(129, 140, 248, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Mantra Section -->
        <div class="mantra-card">
            <h1>Core Focus</h1>
            <div class="mantra-text" id="mantraDisplay" contenteditable="false">"Taking opportunities creates new opportunities."</div>
        </div>

        <!-- Daily Focus Checklist -->
        <div class="focus-list">
            <h2>Today's Intentions</h2>
            <div class="todo-item">
                <input type="checkbox" id="check1">
                <div class="todo-text" id="task1" contenteditable="false">Protect high-focus deep work intervals</div>
            </div>
            <div class="todo-item">
                <input type="checkbox" id="check2">
                <div class="todo-text" id="task2" contenteditable="false">Review portfolio allocations</div>
            </div>
            <div class="todo-item">
                <input type="checkbox" id="check3">
                <div class="todo-text" id="task3" contenteditable="false">Complete evening conditioning/cardio</div>
            </div>
        </div>

        <!-- Edit/Save Control -->
        <button class="action-btn" id="editBtn">Edit Dashboard</button>
    </div>

    <script>
        const editBtn = document.getElementById('editBtn');
        const editableElements = [
            document.getElementById('mantraDisplay'),
            document.getElementById('task1'),
            document.getElementById('task2'),
            document.getElementById('task3')
        ];
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');

        // Load saved text and checkbox data from local browser storage
        window.addEventListener('DOMContentLoaded', () => {
            editableElements.forEach(el => {
                const savedText = localStorage.getItem(el.id);
                if (savedText) el.innerText = savedText;
            });

            checkboxes.forEach(box => {
                const savedCheck = localStorage.getItem(box.id);
                if (savedCheck === 'true') box.checked = true;
            });
        });

        // Track and save checkbox states automatically
        checkboxes.forEach(box => {
            box.addEventListener('change', (e) => {
                localStorage.setItem(box.id, e.target.checked);
            });
        });

        // Toggle Edit Mode
        let isEditing = false;
        editBtn.addEventListener('click', () => {
            isEditing = !isEditing;
            
            if (isEditing) {
                // Enter edit mode
                editableElements.forEach(el => el.setAttribute('contenteditable', 'true'));
                editBtn.innerText = 'Save Dashboard';
                editBtn.style.borderColor = 'var(--accent)';
            } else {
                // Exit and save mode
                editableElements.forEach(el => {
                    el.setAttribute('contenteditable', 'false');
                    localStorage.setItem(el.id, el.innerText); // Lock to local memory
                });
                editBtn.innerText = 'Edit Dashboard';
                editBtn.style.borderColor = 'var(--border-color)';
            }
        });
    </script>
</body>
</html>
