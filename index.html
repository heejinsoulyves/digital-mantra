<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Focus Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #818cf8;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .mantra-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-0 0 16px 0;
        }

        .mantra-text {
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
        }

        .focus-list {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            text-align: left;
        }

        h2 {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0 0 16px 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .todo-item:last-child {
            margin-bottom: 0;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            margin-right: 12px;
            cursor: pointer;
            position: relative;
            background: transparent;
            transition: all 0.2s ease;
        }

        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: #0f172a;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .todo-text {
            font-size: 1rem;
            transition: color 0.2s ease, text-decoration 0.2s ease;
        }

        input[type="checkbox"]:checked + .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Mantra Section -->
        <div class="mantra-card">
            <h1>Current Core Mantra</h1>
            <div class="mantra-text">"Taking opportunities creates new opportunities."</div>
        </div>

        <!-- Daily Focus Checklist -->
        <div class="focus-list">
            <h2>Today's Intentions</h2>
            <label class="todo-item">
                <input type="checkbox" id="task1">
                <span class="todo-text">Protect high-focus deep work intervals</span>
            </label>
            <label class="todo-item">
                <input type="checkbox" id="task2">
                <span class="todo-text">Review portfolio allocations</span>
            </label>
            <label class="todo-item">
                <input type="checkbox" id="task3">
                <span class="todo-text">Complete evening conditioning/cardio</span>
            </label>
        </div>
    </div>

    <script>
        // Simple persistence script to save checkbox state
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        
        // Load saved states
        checkboxes.forEach(box => {
            const savedState = localStorage.getItem(box.id);
            if (savedState === 'true') {
                box.checked = true;
            }
            
            // Listen for changes
            box.addEventListener('change', (e) => {
                localStorage.setItem(box.id, e.target.checked);
            });
        });
    </script>
</body>
</html>
